[project]
name = "brk-client"
version = "0.3.0-beta.7"
description = "Bitcoin on-chain analytics client — thousands of metrics, block explorer, and address index"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
keywords = ["bitcoin", "blockchain", "analytics", "on-chain", "metrics", "api", "data", "cryptocurrency", "brk"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://bitcoinresearchkit.org"
Repository = "https://github.com/bitcoinresearchkit/brk"

[dependency-groups]
dev = [
    "pandas>=2.3.3",
    "polars>=1.36.1",
    "pydoc-markdown>=4.8.2",
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
# `check_endpoints.py` at the root of tests/mempool_compat needs the extra glob.
python_files = ["test_*.py", "check_*.py"]
testpaths = ["tests"]

[tool.ruff.lint]
ignore = ["E701"]
