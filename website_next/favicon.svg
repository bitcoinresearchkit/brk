    .glass { fill-opacity: 0.4; }
    .glass-top,       .liquid-top   { fill: var(--face-top); }
    .glass-right,     .liquid-right { fill: var(--face-right); }
    .glass-left,      .liquid-left  { fill: var(--face-left); }
